name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & publish installer
    runs-on: macos-15

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install JUCE
        run: |
          git clone --depth 1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git ~/JUCE

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Configure (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Package ───────────────────────────────────────────────────────────────
      - name: Create installer
        run: |
          # Skip the cmake build step inside package.sh — we just built above.
          # Stage, pkgbuild and productbuild only.
          VERSION="${GITHUB_REF_NAME#v}"   # strip leading "v" from tag
          PRODUCT="Imperial"
          ARTEFACTS="build/Imperial_artefacts/Release"
          STAGING="build/pkg_staging"
          PKGS="build/pkgs"
          DIST="dist"
          mkdir -p "$DIST" "$PKGS"

          # Stage
          VST3_STAGE="$STAGING/vst3/Library/Audio/Plug-Ins/VST3"
          AU_STAGE="$STAGING/au/Library/Audio/Plug-Ins/Components"
          APP_STAGE="$STAGING/app/Applications"
          mkdir -p "$VST3_STAGE" "$AU_STAGE" "$APP_STAGE"
          cp -R "$ARTEFACTS/VST3/$PRODUCT.vst3"                "$VST3_STAGE/"
          cp -R "$ARTEFACTS/AU/$PRODUCT.component"             "$AU_STAGE/"
          cp -R "$ARTEFACTS/Standalone/$PRODUCT.app"           "$APP_STAGE/"

          # Component packages
          pkgbuild --root "$STAGING/vst3" \
                   --identifier "com.opencode.imperial.vst3" \
                   --version "$VERSION" --install-location "/" \
                   "$PKGS/Imperial-VST3.pkg"

          pkgbuild --root "$STAGING/au" \
                   --identifier "com.opencode.imperial.au" \
                   --version "$VERSION" --install-location "/" \
                   "$PKGS/Imperial-AU.pkg"

          pkgbuild --root "$STAGING/app" \
                   --identifier "com.opencode.imperial.app" \
                   --version "$VERSION" --install-location "/" \
                   "$PKGS/Imperial-Standalone.pkg"

          # Distribution XML
          cat > build/distribution.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
            <title>Imperial $VERSION</title>
            <options require-scripts="false" customize="always" />
            <choices-outline>
              <line choice="vst3"/>
              <line choice="au"/>
              <line choice="app"/>
            </choices-outline>
            <choice id="vst3" title="VST3 Plugin"
                    description="Installs Imperial.vst3 to /Library/Audio/Plug-Ins/VST3">
              <pkg-ref id="com.opencode.imperial.vst3"/>
            </choice>
            <choice id="au" title="Audio Unit (AU) Plugin"
                    description="Installs Imperial.component to /Library/Audio/Plug-Ins/Components">
              <pkg-ref id="com.opencode.imperial.au"/>
            </choice>
            <choice id="app" title="Standalone App"
                    description="Installs Imperial.app to /Applications">
              <pkg-ref id="com.opencode.imperial.app"/>
            </choice>
            <pkg-ref id="com.opencode.imperial.vst3" version="$VERSION">Imperial-VST3.pkg</pkg-ref>
            <pkg-ref id="com.opencode.imperial.au"   version="$VERSION">Imperial-AU.pkg</pkg-ref>
            <pkg-ref id="com.opencode.imperial.app"  version="$VERSION">Imperial-Standalone.pkg</pkg-ref>
          </installer-gui-script>
          XML

          productbuild \
            --distribution build/distribution.xml \
            --package-path "$PKGS" \
            "$DIST/$PRODUCT-$VERSION.pkg"

          echo "PKG_PATH=$DIST/$PRODUCT-$VERSION.pkg" >> "$GITHUB_ENV"
          echo "PKG_NAME=$PRODUCT-$VERSION.pkg"       >> "$GITHUB_ENV"

      # ── Publish ───────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Imperial ${{ github.ref_name }}"
          body: |
            ## Installation

            1. Download **${{ env.PKG_NAME }}** below.
            2. Double-click to run the installer — choose VST3, AU and/or Standalone.
            3. **Gatekeeper notice:** this build is unsigned. If macOS blocks it, right-click the `.pkg` and choose **Open**, or run:
               ```sh
               sudo xattr -rd com.apple.quarantine "${{ env.PKG_NAME }}"
               ```

            ### Install locations
            | Format | Path |
            |--------|------|
            | VST3 | `/Library/Audio/Plug-Ins/VST3/` |
            | AU | `/Library/Audio/Plug-Ins/Components/` |
            | Standalone | `/Applications/` |
          files: ${{ env.PKG_PATH }}
          fail_on_unmatched_files: true
